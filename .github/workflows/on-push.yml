concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

name: CI CD Pipeline

on:
  push:
    branches:
      - 'dev'
      - 'main'

env:
  python-version: 3.11

permissions:
  contents: read
  id-token: write

jobs:
  run-checks:
    uses: ./.github/workflows/run-checks.yml
    secrets: inherit

  check-firmware-changes:
    runs-on: ubuntu-latest
    outputs:
      firmware_changed: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            firmware:
              - 'src/**'
              - 'platformio.ini'
              - 'partitions_ota.csv'

  build:
    if: |
      github.ref == 'refs/heads/main' &&
      needs.check-firmware-changes.outputs.firmware_changed == 'true'
    needs: [run-checks, check-firmware-changes]
    uses: ./.github/workflows/build.yml
    secrets: inherit
