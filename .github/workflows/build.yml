name: Firmware Build & Upload

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - 'partitions_ota.csv'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Get version
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Upload firmware to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .pio/build/m5stack-atom/firmware.bin
          destination: ${{ secrets.GCP_PROJECT_ID }}-firmware/${{ steps.version.outputs.sha }}

      - name: Update latest.json
        run: |
          echo '{
            "version": "${{ steps.version.outputs.sha }}",
            "url": "https://storage.googleapis.com/${{ secrets.GCP_PROJECT_ID }}-firmware/${{ steps.version.outputs.sha }}/firmware.bin",
            "built_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' > latest.json

      - name: Upload latest.json
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: latest.json
          destination: ${{ secrets.GCP_PROJECT_ID }}-firmware

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/m5stack-atom/firmware.bin
          retention-days: 30
