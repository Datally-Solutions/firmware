name: Build firmware
permissions:
  contents: read
  id-token: write

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create secrets.h
        run: |
          cat > src/secrets.h << EOF
          #pragma once
          const char* ssid      = "${{ secrets.SSID }}";
          const char* password  = "${{ secrets.PASSWORD }}";
          const String botToken = "${{ secrets.BOTTOKEN }}";
          const String chatId   = "${{ secrets.CHATID }}";
          const char* ingestUrl   = "${{ secrets.ingestUrl }}";
          const char* ingestToken = "${{ secrets.ingestToken }}";
          EOF

      - name: Build firmware
        run: pio run

      - name: Get short SHA
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/m5stack-atom/firmware.bin
          retention-days: 30

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CICD_SA_EMAIL }}

      - name: Upload firmware to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .pio/build/m5stack-atom/firmware.bin
          destination: ${{ secrets.GCP_PROJECT_ID }}-firmware/${{ steps.version.outputs.sha }}
          process_gcloudignore: false

      - name: Generate and upload latest.json
        run: |
          cat > latest.json << EOF
          {
            "version": "${{ steps.version.outputs.sha }}",
            "url": "https://storage.googleapis.com/${{ secrets.GCP_PROJECT_ID }}-firmware/${{ steps.version.outputs.sha }}/firmware.bin",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload latest.json to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: latest.json
          destination: ${{ secrets.GCP_PROJECT_ID }}-firmware
          process_gcloudignore: false
